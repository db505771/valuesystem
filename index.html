<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Value Ledger</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Bulletproof React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Bulletproof Firebase Compat CDNs (No ESM imports, avoids GitHub Pages CORS issues) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    
    body {
      background-color: #111318;
      color: #EDEEF0;
      font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    }

    .font-mono-custom {
      font-family: 'JetBrains Mono', ui-monospace, 'Courier New', monospace;
    }

    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #191C22;
    }
    ::-webkit-scrollbar-thumb {
      background: #2A2F39;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #565C68;
    }
  </style>
</head>
<body>
  <!-- Screen mounting target -->
  <div id="root">
    <!-- Friendly Loading placeholder while Babel compiles the bundle -->
    <div class="min-h-screen flex flex-col items-center justify-center bg-[#111318]">
      <span class="text-sm tracking-widest uppercase text-[#868C99] font-mono-custom animate-pulse mb-2">
        Booting Ledger Interface...
      </span>
      <div class="w-16 h-1 rounded-full bg-[#3ECF8E] overflow-hidden relative">
        <div class="absolute top-0 left-0 h-full w-1/2 bg-white rounded-full animate-ping"></div>
      </div>
    </div>
  </div>

  <!-- App Script compiled via Babel on-the-fly -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    const { createRoot } = ReactDOM;

    // ---- Design Tokens ---------------------------------------------------
    const C = {
      bg: "#111318",
      panel: "#191C22",
      panel2: "#1F232B",
      line: "#2A2F39",
      text: "#EDEEF0",
      muted: "#868C99",
      faint: "#565C68",
      green: "#3ECF8E",
      greenDim: "#1E3B31",
      red: "#F2545B",
      redDim: "#3B2226",
      amber: "#E8B94A",
      amberDim: "#3A331F",
    };

    const AUTO_INTERVAL_MS = 7000;
    const CHANGE_PROOF_CHANCE = 0.90;

    // ---- Seed Data ---------------------------------------------------
    const SEED_NAMES_VALUES = [
      ["Shadow Dragon", 4200], ["Golden Phoenix", 3800], ["Frost Griffin", 2600], ["Crimson Kraken", 5000],
      ["Storm Wolf", 1200], ["Ember Fox", 800], ["Arctic Owl", 650], ["Jade Panda", 1500],
      ["Solar Tiger", 2100], ["Abyssal Shark", 3300], ["Ancient Turtle", 950], ["Nova Falcon", 1750],
      ["Obsidian Bear", 2800], ["Lunar Lynx", 1100], ["Void Raven", 4600], ["Venom Cobra", 700],
      ["Glacier Otter", 500], ["Thunder Elk", 1900], ["Blaze Hawk", 1300], ["Midnight Panther", 3900],
      ["Copper Serpent", 600], ["Sapphire Wyrm", 4400], ["Ashen Owl", 1050], ["Verdant Stag", 1600],
      ["Ivory Fox", 900], ["Cobalt Falcon", 2300], ["Sunfire Lion", 3600], ["Twilight Moth", 450],
      ["Steel Boar", 1400], ["Radiant Unicorn", 5200],
    ];
    
    // Dynamic trend states matching trading sentiments
    const TRENDS = {
      STABLE: "stable",
      RISING: "rising",
      DROPPING: "dropping",
      RISING_SHOULD_DROP: "rising_should_drop",
      DROPPING_SHOULD_RISE: "dropping_should_rise",
      CRASHED: "crashed"
    };

    const uid = () => Math.random().toString(36).slice(2, 10);
    const SEED_ITEMS = SEED_NAMES_VALUES.map(([name, value]) => ({ 
      id: uid(), 
      name, 
      startingValue: value, 
      value,
      trend: TRENDS.STABLE
    }));
    const fmt = (n) => new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n || 0);

    // ---- Verdict Helpers ---------------------------------------------------
    function computeVerdict(outTotal, inTotal) {
      const diff = inTotal - outTotal;
      const pct = outTotal === 0 ? 100 : (diff / outTotal) * 100;
      let verdict;
      if (pct > 5) verdict = "OVERPAY";
      else if (pct < -5) verdict = "UNDERPAY";
      else verdict = "STABLE";
      let summary;
      if (verdict === "OVERPAY") summary = `Receiver gains roughly ${Math.abs(pct).toFixed(1)}% more value than they give.`;
      else if (verdict === "UNDERPAY") summary = `Receiver loses roughly ${Math.abs(pct).toFixed(1)}% value compared to what they give.`;
      else summary = `Both sides are within about ${Math.abs(pct).toFixed(1)}% of each other.`;
      return { verdict, summary };
    }

    function verdictColor(label) {
      if (label === "OVERPAY") return { color: C.green, dim: C.greenDim };
      if (label === "UNDERPAY") return { color: C.red, dim: C.redDim };
      if (label === "STABLE") return { color: C.amber, dim: C.amberDim };
      return { color: C.muted, dim: C.panel2 };
    }

    // ---- Inline SVG Icons -------------------------------------------------
    const Icon = ({ name, size = 16, className = "" }) => {
      const paths = {
        Plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v14m-7-7h14" />,
        Trash2: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />,
        Pencil: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />,
        Check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />,
        X: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />,
        ArrowRightLeft: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />,
        Clock3: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
        ScrollText: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
        TrendingUp: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />,
        TrendingDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />,
        Minus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 12H4" />,
        Shuffle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4h7l4 4 4-4h1m-1 0l-3-3m3 3l-3 3M4 20h7l4-4 4 4h1m-1 0l-3-3m3 3l-3 3" />,
        Play: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />,
        Pause: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Zap: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />,
        Database: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />,
        Search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        ArrowLeft: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />,
        AlertTriangle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width={size} height={size} className={className}>
          {paths[name] || null}
        </svg>
      );
    };

    // ---- Native SVG Valuation Line Graph Component ---------------------
    function ValuationGraph({ history, colorTheme }) {
      if (!history || history.length < 2) {
        return (
          <div className="flex flex-col items-center justify-center p-6 border border-[#2A2F39] rounded-xl bg-[#111318]/50 text-center">
            <span className="text-xs text-[#565C68] font-mono-custom font-semibold">Flat Value Threshold</span>
            <span className="text-[10px] text-white/30 max-w-[280px] mt-1">
              No historical price modifications on ledger database yet. Modify this item's price to begin plotting.
            </span>
          </div>
        );
      }

      const padding = 16;
      const width = 500;
      const height = 140;
      const chartWidth = width - padding * 2;
      const chartHeight = height - padding * 2;

      const values = history.map(h => h.value);
      const minVal = Math.min(...values);
      const maxVal = Math.max(...values);
      const valRange = maxVal - minVal === 0 ? 1 : maxVal - minVal;

      const points = history.map((p, idx) => {
        const x = padding + (idx / (history.length - 1)) * chartWidth;
        const y = padding + chartHeight - ((p.value - minVal) / valRange) * chartHeight;
        return { x, y, value: p.value, date: p.date };
      });

      const linePath = points.reduce((acc, p, idx) => {
        return acc + (idx === 0 ? `M ${p.x} ${p.y}` : ` L ${p.x} ${p.y}`);
      }, "");

      const areaPath = points.length > 0 
        ? `${linePath} L ${points[points.length - 1].x} ${height - padding} L ${points[0].x} ${height - padding} Z`
        : "";

      return (
        <div className="bg-[#111318]/70 border border-[#2A2F39] rounded-xl p-4 mt-2 relative overflow-hidden animate-fadeIn">
          <div className="text-[10px] font-mono-custom text-emerald-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <span className="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            Valuation swing-graph
          </div>

          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-32 overflow-visible">
            <defs>
              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={colorTheme} stopOpacity="0.3"/>
                <stop offset="100%" stopColor={colorTheme} stopOpacity="0"/>
              </linearGradient>
            </defs>

            <line x1={padding} y1={padding} x2={width - padding} y2={padding} stroke="#2A2F39" strokeWidth="0.75" strokeDasharray="3,3" />
            <line x1={padding} y1={padding + chartHeight / 2} x2={width - padding} y2={padding + chartHeight / 2} stroke="#2A2F39" strokeWidth="0.75" strokeDasharray="3,3" />
            <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#2A2F39" strokeWidth="1" />

            <path d={areaPath} fill="url(#chartGradient)" className="transition-all duration-300" />

            <path 
              d={linePath} 
              fill="none" 
              stroke={colorTheme} 
              strokeWidth="2.5" 
              strokeLinecap="round" 
              strokeLinejoin="round" 
              className="transition-all duration-300"
            />

            {points.map((p, idx) => (
              <g key={idx} className="group cursor-pointer">
                <circle 
                  cx={p.x} 
                  cy={p.y} 
                  r="4" 
                  fill="#111318" 
                  stroke={colorTheme} 
                  strokeWidth="2.5" 
                  className="transition-all duration-150 group-hover:r-5 group-hover:fill-white" 
                />
                <rect 
                  x={p.x - 30} 
                  y={p.y - 28} 
                  width="60" 
                  height="18" 
                  rx="4" 
                  fill="#1F232B" 
                  stroke="#2A2F39" 
                  strokeWidth="1" 
                  className="hidden group-hover:block transition-all" 
                />
                <text 
                  x={p.x} 
                  y={p.y - 15} 
                  textAnchor="middle" 
                  className="hidden group-hover:block font-mono-custom fill-[#EDEEF0] text-[9px] font-bold"
                >
                  {fmt(p.value)}
                </text>
              </g>
            ))}
          </svg>

          <div className="flex justify-between text-[9px] text-[#565C68] font-mono-custom mt-2 pt-1.5 border-t border-white/5">
            <span>START: {new Date(history[0].date).toLocaleDateString()}</span>
            <span>LIVE RECORDING</span>
          </div>
        </div>
      );
    }

    // ---- Main Component --------------------------------------------------
    function ValueLedger() {
      const [view, setView] = useState("ledger");
      const [items, setItems] = useState([]);
      const [proofs, setProofs] = useState([]);
      const [changeLog, setChangeLog] = useState([]);
      const [autoRunning, setAutoRunning] = useState(false);
      const [ready, setReady] = useState(false);
      const [saveStatus, setSaveStatus] = useState(null); // { ok, error, ts } | null
      
      const [user, setUser] = useState(null);
      const [usingFirebase, setUsingFirebase] = useState(false);

      const [newName, setNewName] = useState("");
      const [newValue, setNewValue] = useState("");
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState({ name: "", value: "", trend: TRENDS.STABLE });
      const [searchQuery, setSearchQuery] = useState("");
      
      const [referredFromProofs, setReferredFromProofs] = useState(false);
      const [expandedItemId, setExpandedItemId] = useState(null);

      const itemsRef = useRef(items);
      useEffect(() => { itemsRef.current = items; }, [items]);

      const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);

      useEffect(() => {
        let initializedDb = null;
        let initializedAuth = null;

        try {
          if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            const firebaseConfig = JSON.parse(__firebase_config);
            
            let app;
            if (window.firebase.apps.length === 0) {
              app = window.firebase.initializeApp(firebaseConfig);
            } else {
              app = window.firebase.app();
            }
            
            initializedAuth = app.auth();
            initializedDb = app.firestore();
            
            setAuth(initializedAuth);
            setDb(initializedDb);
          }
        } catch (e) {
          console.warn("Firebase config could not be processed. Switching to Offline Cache.", e);
        }

        if (!initializedAuth || !initializedDb) {
          const localItems = localStorage.getItem(`${appId}_items`);
          const localProofs = localStorage.getItem(`${appId}_proofs`);
          const localChanges = localStorage.getItem(`${appId}_changes`);
          const localAuto = localStorage.getItem(`${appId}_auto`);

          setItems(localItems ? JSON.parse(localItems) : SEED_ITEMS);
          setProofs(localProofs ? JSON.parse(localProofs) : []);
          setChangeLog(localChanges ? JSON.parse(localChanges) : []);
          setAutoRunning(localAuto ? JSON.parse(localAuto) : false);
          setReady(true);
        }
      }, []);

      // Handle Authentication if Firebase exists (RULE 3)
      useEffect(() => {
        if (!auth || !db) return;

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
            setUsingFirebase(true);
          } catch (e) {
            console.error("Auth sign-in failed. Defaulting to local memory.", e);
            setUsingFirebase(false);
            setItems(SEED_ITEMS);
            setReady(true);
          }
        };

        initAuth();

        const unsubscribe = auth.onAuthStateChanged((usr) => {
          setUser(usr);
          if (!usr) {
            setUsingFirebase(false);
          }
        });
        return () => unsubscribe();
      }, [auth, db]);

      // Realtime Data Sync from Firestore (RULES 1, 2, 3)
      useEffect(() => {
        if (!user || !db) return;

        const baseUserRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid);

        // Sync Items
        const unsubItems = baseUserRef.collection('items').onSnapshot((snapshot) => {
          const loaded = [];
          snapshot.forEach((doc) => {
            loaded.push({ id: doc.id, ...doc.data() });
          });
          
          if (loaded.length === 0) {
            SEED_ITEMS.forEach(async (item) => {
              await baseUserRef.collection('items').doc(item.id).set({
                name: item.name,
                startingValue: item.startingValue,
                value: item.value,
                trend: item.trend || TRENDS.STABLE
              });
            });
          } else {
            setItems(loaded);
          }
          setReady(true);
        }, (err) => {
          console.error("Firebase Items sync error:", err);
          setSaveStatus({ ok: false, error: "Realtime items load failed" });
        });

        // Sync Proofs
        const unsubProofs = baseUserRef.collection('proofs').onSnapshot((snapshot) => {
          const loaded = [];
          snapshot.forEach((doc) => {
            loaded.push({ id: doc.id, ...doc.data() });
          });
          setProofs(loaded);
        }, (err) => {
          console.error("Firebase Proofs subscription error:", err);
        });

        // Sync Value Change logs
        const unsubChanges = baseUserRef.collection('changes').onSnapshot((snapshot) => {
          const loaded = [];
          snapshot.forEach((doc) => {
            loaded.push({ id: doc.id, ...doc.data() });
          });
          loaded.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          setChangeLog(loaded);
        }, (err) => {
          console.error("Firebase Changes subscription error:", err);
        });

        // Sync settings
        const unsubSettings = baseUserRef.collection('settings').doc('auto-running').onSnapshot((docSnap) => {
          if (docSnap.exists) {
            setAutoRunning(docSnap.data().value);
          } else {
            setAutoRunning(false);
          }
        }, (err) => {
          console.error("Firebase Settings subscription error:", err);
        });

        return () => {
          unsubItems();
          unsubProofs();
          unsubChanges();
          unsubSettings();
        };
      }, [user, db]);

      const reportSaveResult = useCallback((result) => {
        const ts = Date.now();
        setSaveStatus({ ...result, ts });
        if (result.ok) {
          setTimeout(() => {
            setSaveStatus((cur) => (cur && cur.ts === ts ? null : cur));
          }, 2500);
        }
      }, []);

      // Persist Operations
      const handleAddItem = async () => {
        const val = parseFloat(newValue);
        if (!newName.trim() || isNaN(val)) return;

        const newId = uid();
        const payload = { 
          id: newId, 
          name: newName.trim(), 
          startingValue: val, 
          value: val, 
          trend: TRENDS.STABLE 
        };

        if (usingFirebase && db && user) {
          try {
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('items').doc(newId).set(payload);
            reportSaveResult({ ok: true });
          } catch (e) {
            reportSaveResult({ ok: false, error: e.message });
          }
        } else {
          const next = [...items, payload];
          setItems(next);
          localStorage.setItem(`${appId}_items`, JSON.stringify(next));
          reportSaveResult({ ok: true });
        }
        setNewName("");
        setNewValue("");
      };

      // Atomic Trend Update helper to transition items
      const updateItemTrend = async (itemId, newTrend) => {
        if (usingFirebase && db && user) {
          try {
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('items').doc(itemId).update({ trend: newTrend });
          } catch (e) {
            console.error("Failed to sync automated trend transition:", e);
          }
        } else {
          setItems((prev) => {
            const next = prev.map(it => it.id === itemId ? { ...it, trend: newTrend } : it);
            localStorage.setItem(`${appId}_items`, JSON.stringify(next));
            return next;
          });
        }
      };

      const handleSaveEdit = async (id) => {
        const val = parseFloat(editDraft.value);
        const item = items.find((i) => i.id === id);
        const changed = item && !isNaN(val) && val !== item.value;
        const targetName = editDraft.name.trim() || item.name;

        // Auto-trends on change based on price drops or rises
        let targetTrend = editDraft.trend;
        if (changed) {
          if (val > item.value) {
            // Pivot check: if it was dropping, trigger transitional sentiment sequence
            targetTrend = item.trend === TRENDS.DROPPING ? TRENDS.DROPPING_SHOULD_RISE : TRENDS.RISING;
          } else if (val < item.value) {
            // Pivot check: if it was rising, trigger transitional sentiment sequence
            targetTrend = item.trend === TRENDS.RISING ? TRENDS.RISING_SHOULD_DROP : TRENDS.DROPPING;
          }
        }

        // Auto-crash safeguard if a pet rises way too much
        if (val > item.startingValue * 1.8) {
          targetTrend = TRENDS.CRASHED;
        }

        if (usingFirebase && db && user) {
          try {
            if (changed) {
              const changeId = uid();
              await db.collection('artifacts').doc(appId)
                .collection('users').doc(user.uid)
                .collection('changes').doc(changeId).set({
                  itemId: id,
                  itemName: targetName,
                  oldValue: item.value,
                  newValue: val,
                  timestamp: new Date().toISOString()
                });
            }
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('items').doc(id).update({
                name: targetName,
                value: isNaN(val) ? item.value : val,
                trend: targetTrend
              });
            reportSaveResult({ ok: true });
          } catch (e) {
            reportSaveResult({ ok: false, error: e.message });
          }
        } else {
          let updatedChanges = changeLog;
          if (changed) {
            updatedChanges = [
              { id: uid(), itemId: id, itemName: targetName, oldValue: item.value, newValue: val, timestamp: new Date().toISOString() },
              ...changeLog,
            ];
            setChangeLog(updatedChanges);
            localStorage.setItem(`${appId}_changes`, JSON.stringify(updatedChanges));
          }
          const nextItems = items.map((i) => (i.id === id ? { ...i, name: targetName, value: isNaN(val) ? i.value : val, trend: targetTrend } : i));
          setItems(nextItems);
          localStorage.setItem(`${appId}_items`, JSON.stringify(nextItems));
          reportSaveResult({ ok: true });
        }

        setEditingId(null);
        if (changed && Math.random() < CHANGE_PROOF_CHANCE) {
          generateChangeProof(id, val, targetTrend);
        }
      };

      const pushProof = useCallback(async (proof) => {
        // Equal trades cool down system: if proof verdict results in STABLE, automatically set all involved items' trends back to STABLE
        const outItems = proof.outIds.map((id) => itemsById[id]).filter(Boolean);
        const inItems = proof.inIds.map((id) => itemsById[id]).filter(Boolean);
        const outTotal = outItems.reduce((s, i) => s + i.value, 0);
        const inTotal = inItems.reduce((s, i) => s + i.value, 0);
        const { verdict } = computeVerdict(outTotal, inTotal);

        if (verdict === "STABLE") {
          const involvedIds = [...proof.outIds, ...proof.inIds];
          involvedIds.forEach(itemId => {
            const currentItem = itemsById[itemId];
            if (currentItem && currentItem.trend !== TRENDS.STABLE) {
              updateItemTrend(itemId, TRENDS.STABLE);
            }
          });
        }

        if (usingFirebase && db && user) {
          try {
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('proofs').doc(proof.id).set(proof);
            reportSaveResult({ ok: true });
          } catch (e) {
            reportSaveResult({ ok: false, error: e.message });
          }
        } else {
          setProofs((prev) => {
            const next = [proof, ...prev];
            localStorage.setItem(`${appId}_proofs`, JSON.stringify(next));
            return next;
          });
          reportSaveResult({ ok: true });
        }
      }, [usingFirebase, db, user, reportSaveResult, itemsById]);

      const handleDeleteProof = async (id) => {
        if (usingFirebase && db && user) {
          try {
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('proofs').doc(id).delete();
            reportSaveResult({ ok: true });
          } catch (e) {
            reportSaveResult({ ok: false, error: e.message });
          }
        } else {
          setProofs((prev) => {
            const next = prev.filter((p) => p.id !== id);
            localStorage.setItem(`${appId}_proofs`, JSON.stringify(next));
            return next;
          });
          reportSaveResult({ ok: true });
        }
      };

      const handleToggleAuto = async () => {
        const next = !autoRunning;
        if (usingFirebase && db && user) {
          try {
            await db.collection('artifacts').doc(appId)
              .collection('users').doc(user.uid)
              .collection('settings').doc('auto-running').set({ value: next });
            reportSaveResult({ ok: true });
          } catch (e) {
            reportSaveResult({ ok: false, error: e.message });
          }
        } else {
          setAutoRunning(next);
          localStorage.setItem(`${appId}_auto`, JSON.stringify(next));
          reportSaveResult({ ok: true });
        }
      };

      // ---- Balanced Multi-Item Bundle Matching Engine ----
      const selectBundle = (allItems, excludeIds, targetVal, minCount = 1, maxCount = 2) => {
        const available = allItems.filter(it => !excludeIds.includes(it.id));
        if (available.length === 0) return [];
        
        let bestCombination = [];
        let bestDiff = Infinity;
        
        for (let attempt = 0; attempt < 80; attempt++) {
          const count = Math.floor(Math.random() * (maxCount - minCount + 1)) + minCount;
          const shuffled = [...available].sort(() => Math.random() - 0.5);
          const selection = shuffled.slice(0, count);
          const sum = selection.reduce((s, it) => s + it.value, 0);
          const diff = Math.abs(sum - targetVal);
          
          if (diff < bestDiff) {
            bestDiff = diff;
            bestCombination = selection;
          }
          
          if (diff <= targetVal * 0.08) {
            return selection;
          }
        }
        return bestCombination;
      };

      // Core Trend Pivot Sequence Builder
      // First generates an Equal trade with the target item in OUT slot, then updates trend state and generates the target action trade
      const executePivotSequence = useCallback(async (baseItem, companionItem, endingTrend, isDropPivot) => {
        const list = itemsRef.current;
        if (list.length < 4) return;

        // Stage 1: Generate Equal Trade (STABLE) Proof
        // Owner gives: baseItem (pivot item) + companionItem in OUT
        const outIds = [baseItem.id, companionItem.id];
        const outTotal = baseItem.value + companionItem.value;

        // Equal Trade: IN value matches OUT value close to 1.0 ratio
        const equalOutItems = selectBundle(list, outIds, outTotal, 1, 2);
        if (equalOutItems.length > 0) {
          const equalInIds = equalOutItems.map(it => it.id);
          await pushProof({
            id: uid(),
            timestamp: new Date().toISOString(),
            outIds: outIds, // Gives base item
            inIds: equalInIds, // Gets equal value items
            sourceType: "change"
          });
        }

        // Transition item's live trend state
        await updateItemTrend(baseItem.id, endingTrend);

        // Stage 2: Generate the subsequent Underpay/Overpay proof (after brief interval)
        setTimeout(async () => {
          const updatedList = itemsRef.current;
          const freshBase = updatedList.find(i => i.id === baseItem.id) || baseItem;
          const freshCompanion = updatedList.find(i => i.id === companionItem.id) || companionItem;
          
          const freshOutIds = [freshBase.id, freshCompanion.id];
          const freshOutTotal = freshBase.value + freshCompanion.value;

          let targetRatio = 1.0;
          if (isDropPivot) {
            // Drop Pivot: Strictly receives LESS value than given (IN < OUT, ratio: 0.78 to 0.90)
            targetRatio = 0.78 + Math.random() * 0.12;
          } else {
            // Rise Pivot: Strictly receives MORE value than given (IN > OUT, ratio: 1.08 to 1.22)
            targetRatio = 1.08 + Math.random() * 0.14;
          }

          const targetInValue = freshOutTotal * targetRatio;
          const actionInItems = selectBundle(updatedList, freshOutIds, targetInValue, 1, 2);
          if (actionInItems.length > 0) {
            const actionInIds = actionInItems.map(it => it.id);
            await pushProof({
              id: uid(),
              timestamp: new Date(Date.now() + 1000).toISOString(), // ordering in list
              outIds: freshOutIds,
              inIds: actionInIds,
              sourceType: "change"
            });
          }
        }, 1200);

      }, [pushProof]);

      // Simulation loop trigger
      const generateRandomProof = useCallback(() => {
        const list = itemsRef.current;
        if (list.length < 4) return;

        // Speculative Bot Sentiment preference shifts
        if (Math.random() < 0.25) {
          const speculativeItem = list[Math.floor(Math.random() * list.length)];
          const possibleForecasts = [TRENDS.RISING_SHOULD_DROP, TRENDS.DROPPING_SHOULD_RISE, TRENDS.STABLE];
          const chosenTrendForecast = possibleForecasts[Math.floor(Math.random() * possibleForecasts.length)];
          updateItemTrend(speculativeItem.id, chosenTrendForecast);
        }

        const baseItem = list[Math.floor(Math.random() * list.length)];
        const trend = baseItem.trend || TRENDS.STABLE;

        const availableCompanions = list.filter(it => it.id !== baseItem.id);
        const companionItem = availableCompanions[Math.floor(Math.random() * availableCompanions.length)];

        // Handle active transitional Pivot sentiments in simulation
        if (trend === TRENDS.RISING_SHOULD_DROP) {
          executePivotSequence(baseItem, companionItem, TRENDS.DROPPING, true);
          return;
        } else if (trend === TRENDS.DROPPING_SHOULD_RISE) {
          executePivotSequence(baseItem, companionItem, TRENDS.RISING, false);
          return;
        }

        // Standard direct trade structures
        // Side OUT gives baseItem (rising/dropping/stable) + companionItem
        const outIds = [baseItem.id, companionItem.id];
        const outTotal = baseItem.value + companionItem.value;

        let targetRatio = 1.0; // IN_total / OUT_total ratio
        if (trend === TRENDS.RISING) {
          // Overpay: Receives higher total value (IN > OUT, ratio: 1.06 to 1.22)
          targetRatio = 1.06 + Math.random() * 0.16;
        } else if (trend === TRENDS.DROPPING || trend === TRENDS.CRASHED) {
          // Underpay: Receives lesser total value (IN < OUT, ratio: 0.78 to 0.94)
          targetRatio = 0.78 + Math.random() * 0.16;
        } else {
          targetRatio = 0.96 + Math.random() * 0.08; // Stable trade
        }

        const targetInValue = outTotal * targetRatio;
        const inItems = selectBundle(list, outIds, targetInValue, 1, 2);
        if (inItems.length === 0) return;
        const inIds = inItems.map(it => it.id);

        pushProof({ 
          id: uid(), 
          timestamp: new Date().toISOString(), 
          outIds, 
          inIds, 
          sourceType: "random"
        });
      }, [pushProof, executePivotSequence]);

      // Change Proofs triggered from explicit value action modifications
      const generateChangeProof = useCallback((changedId, nextVal, explicitTrend) => {
        const list = itemsRef.current;
        const changedItem = list.find((i) => i.id === changedId);
        if (!changedItem || list.length < 4) return;

        const val = nextVal !== undefined ? nextVal : changedItem.value;
        const trend = explicitTrend || changedItem.trend || TRENDS.STABLE;

        const availableCompanions = list.filter(it => it.id !== changedId);
        const companionItem = availableCompanions[Math.floor(Math.random() * availableCompanions.length)];

        // Execute Pivot Sequence
        if (trend === TRENDS.RISING_SHOULD_DROP) {
          executePivotSequence(changedItem, companionItem, TRENDS.DROPPING, true);
          return;
        } else if (trend === TRENDS.DROPPING_SHOULD_RISE) {
          executePivotSequence(changedItem, companionItem, TRENDS.RISING, false);
          return;
        }

        // Side OUT contains changedItem + companionItem
        const outIds = [changedItem.id, companionItem.id];
        const outTotal = val + companionItem.value;

        let targetRatio = 1.0;
        if (trend === TRENDS.RISING) {
          // Overpay: gets higher value in return
          targetRatio = 1.06 + Math.random() * 0.16;
        } else if (trend === TRENDS.DROPPING) {
          // Underpay: gets less value than giving
          targetRatio = 0.78 + Math.random() * 0.10;
        } else if (trend === TRENDS.CRASHED) {
          // Crashed: major underpay loss
          targetRatio = 0.70 + Math.random() * 0.10;
        } else {
          targetRatio = 0.96 + Math.random() * 0.08;
        }

        const targetInValue = outTotal * targetRatio;
        const inItems = selectBundle(list, outIds, targetInValue, 1, 2);
        if (inItems.length === 0) return;
        const inIds = inItems.map(it => it.id);

        pushProof({ 
          id: uid(), 
          timestamp: new Date().toISOString(), 
          outIds, 
          inIds, 
          sourceType: "change"
        });
      }, [pushProof, executePivotSequence]);

      useEffect(() => {
        if (!autoRunning) return;
        const id = setInterval(generateRandomProof, AUTO_INTERVAL_MS);
        return () => clearInterval(id);
      }, [autoRunning, generateRandomProof]);

      const startEdit = (e, it) => {
        e.stopPropagation();
        setEditingId(it.id);
        setEditDraft({ name: it.name, value: String(it.value), trend: it.trend || TRENDS.STABLE });
      };

      const handlePetClick = (itemName) => {
        setSearchQuery(itemName);
        setReferredFromProofs(true);
        setView("ledger");

        const target = items.find(it => it.name.toLowerCase() === itemName.toLowerCase());
        if (target) {
          setExpandedItemId(target.id);
        }
      };

      const handleBackToProofs = () => {
        setSearchQuery("");
        setReferredFromProofs(false);
        setView("proofs");
      };

      const handleTabChange = (tabKey) => {
        setView(tabKey);
        if (tabKey !== "ledger") {
          setReferredFromProofs(false);
        }
      };

      const itemsById = useMemo(() => Object.fromEntries(items.map((i) => [i.id, i])), [items]);
      const sortedItems = useMemo(() => [...items].sort((a, b) => b.value - a.value), [items]);

      const filteredItems = useMemo(() => {
        if (!searchQuery.trim()) return sortedItems;
        return sortedItems.filter(it => 
          it.name.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [sortedItems, searchQuery]);

      // 5 of the oldest proofs are displayed
      const oldestProofsDisplayed = useMemo(() => {
        return [...proofs]
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
          .slice(0, 5);
      }, [proofs]);

      const rankedChanges = useMemo(() => {
        return [...items]
          .map((it) => {
            const delta = it.value - it.startingValue;
            const pct = it.startingValue === 0 ? 0 : (delta / it.startingValue) * 100;
            return { ...it, delta, pct };
          })
          .sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));
      }, [items]);

      const getItemValuationHistory = useCallback((itemId) => {
        const item = itemsById[itemId];
        if (!item) return [];

        const logs = [...changeLog]
          .filter(l => l.itemId === itemId)
          .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        const history = [];
        
        const initialDate = logs.length > 0 
          ? new Date(new Date(logs[0].timestamp).getTime() - (3600000 * 24)).toISOString() 
          : new Date(Date.now() - (3600000 * 24)).toISOString();

        history.push({
          value: item.startingValue,
          date: initialDate
        });

        logs.forEach(log => {
          history.push({
            value: log.newValue,
            date: log.timestamp
          });
        });

        return history;
      }, [changeLog, itemsById]);

      const renderTrendBadge = (trend) => {
        switch (trend) {
          case TRENDS.RISING:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Rising</span>;
          case TRENDS.SHOULD_RISE:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full border border-emerald-500/40 text-emerald-300">Should Rise</span>;
          case TRENDS.DROPPING:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full bg-red-500/10 text-red-400 border border-red-500/20">Dropping</span>;
          case TRENDS.SHOULD_DROP:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full border border-red-500/40 text-red-300">Should Drop</span>;
          case TRENDS.CRASHED:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full bg-orange-500/15 text-orange-400 border border-orange-500/30 animate-pulse font-mono-custom">Crashed</span>;
          case TRENDS.SHOULD_STABLE:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full border border-gray-500/40 text-gray-300">Should Stable</span>;
          default:
            return <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full bg-gray-500/10 text-gray-400 border border-gray-500/20">Stable</span>;
        }
      };

      if (!ready) {
        return (
          <div style={{ background: C.bg }} className="min-h-screen flex flex-col items-center justify-center">
            <span style={{ color: C.muted }} className="text-sm tracking-widest uppercase font-mono-custom animate-pulse mb-2">
              Syncing Database...
            </span>
            <div className="w-16 h-1 rounded-full bg-emerald-500 overflow-hidden relative">
              <div className="absolute top-0 left-0 h-full w-1/2 bg-white rounded-full animate-ping"></div>
            </div>
          </div>
        );
      }

      const tabs = [
        { key: "ledger", label: "Ledger", icon: "ScrollText" },
        { key: "proofs", label: "Proofs", icon: "ArrowRightLeft" },
        { key: "changes", label: "Changes", icon: "TrendingUp" },
      ];

      return (
        <div style={{ background: C.bg }} className="min-h-screen w-full relative pb-10">
          <div className="max-w-2xl mx-auto px-4 py-8 flex flex-col gap-6">
            
            {/* Header section */}
            <div className="flex_items-center justify-between flex-wrap gap-4 pb-4 border-b border-[#2A2F39] flex">
              <div>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] tracking-[0.25em] uppercase" style={{ color: C.faint }}>
                    automated trading desk
                  </span>
                  <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-mono-custom ${usingFirebase ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                    <Icon name="Database" size={10} />
                    {usingFirebase ? "CLOUD SYNCD" : "LOCAL CACHE"}
                  </div>
                </div>
                <h1 className="text-3xl font-bold tracking-tight mt-1" style={{ color: C.text }}>
                  Value Ledger
                </h1>
              </div>
              
              <div className="flex rounded-xl p-1 gap-1" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                {tabs.map((t) => (
                  <button
                    key={t.key}
                    onClick={() => handleTabChange(t.key)}
                    className="px-4 py-2 rounded-lg text-xs font-semibold uppercase tracking-wider flex items-center gap-2 transition-all duration-200"
                    style={{ 
                      background: view === t.key ? C.panel2 : "transparent", 
                      color: view === t.key ? C.text : C.muted 
                    }}
                  >
                    <Icon name={t.icon} size={14} />
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Sync Status Notifications */}
            {saveStatus && (
              <div className="transition-all duration-300 animate-fadeIn">
                {saveStatus.ok ? (
                  <div className="flex items-center gap-1 text-xs text-emerald-400">
                    <Icon name="Check" size={14} /> Synced with Database
                  </div>
                ) : (
                  <div className="rounded-xl px-4 py-3 text-xs flex items-center gap-2" style={{ background: C.redDim, color: C.red, border: `1px solid ${C.red}` }}>
                    <Icon name="X" size={16} />
                    <span>Failed to sync: {saveStatus.error}. Check internet connection.</span>
                  </div>
                )}
              </div>
            )}

            {/* TAB VIEW 1: LEDGER */}
            {view === "ledger" && (
              <div className="flex flex-col gap-4">
                
                {/* Back button shown ONLY when referred from pet click on proofs */}
                {referredFromProofs && (
                  <button 
                    onClick={handleBackToProofs}
                    className="flex items-center gap-2 px-3.5 py-2 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all self-start border animate-fadeIn hover:bg-emerald-500/15"
                    style={{ background: `${C.greenDim}40`, color: C.green, borderColor: `${C.green}30` }}
                  >
                    <Icon name="ArrowLeft" size={12} />
                    Back to Proofs
                  </button>
                )}

                {/* Form to insert dynamic listings */}
                <div className="rounded-xl p-4 flex gap-2 flex-wrap items-center animate-fadeIn" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                  <input 
                    value={newName} 
                    onChange={(e) => setNewName(e.target.value)} 
                    placeholder="New Item Name"
                    className="flex-1 min-w-[140px] rounded-lg px-4 py-2.5 text-sm outline-none transition-all duration-200 focus:border-emerald-500/50 text-[#EDEEF0]"
                    style={{ background: C.panel2, color: C.text, border: `1px solid ${C.line}` }} 
                  />
                  <input 
                    value={newValue} 
                    onChange={(e) => setNewValue(e.target.value)} 
                    placeholder="Starting Value" 
                    inputMode="numeric"
                    className="w-32 rounded-lg px-4 py-2.5 text-sm outline-none font-mono-custom transition-all duration-200 focus:border-emerald-500/50 text-[#EDEEF0]"
                    style={{ background: C.panel2, color: C.text, border: `1px solid ${C.line}` }}
                    onKeyDown={(e) => e.key === "Enter" && handleAddItem()} 
                  />
                  <button 
                    onClick={handleAddItem} 
                    className="rounded-lg p-2.5 h-10 w-10 flex items-center justify-center shrink-0 hover:opacity-90 transition-all active:scale-95"
                    style={{ background: C.green, color: "#0C1410" }} 
                    aria-label="Add item"
                  >
                    <Icon name="Plus" size={20} />
                  </button>
                </div>

                {/* Ledger Listing & Search panel */}
                <div className="rounded-xl overflow-hidden" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                  
                  {/* Ledger Search Bar */}
                  <div className="px-4 py-3 border-b flex items-center gap-3" style={{ borderColor: C.line, background: C.panel }}>
                    <div className="text-white/40">
                      <Icon name="Search" size={16} />
                    </div>
                    <input 
                      type="text"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      placeholder="Search items by name..."
                      className="bg-transparent text-sm w-full outline-none text-[#EDEEF0] placeholder-[#565C68]"
                    />
                    {searchQuery && (
                      <button 
                        onClick={() => {
                          setSearchQuery("");
                          setReferredFromProofs(false);
                          setExpandedItemId(null);
                        }}
                        className="text-white/40 hover:text-white transition-all p-1 text-xs"
                      >
                        Clear
                      </button>
                    )}
                  </div>

                  {filteredItems.length === 0 ? (
                    <div className="p-12 text-center text-sm" style={{ color: C.faint }}>
                      {items.length === 0 
                        ? "No trading inventory registered. Enter item parameters above."
                        : "No matching items found for current filter query."
                      }
                    </div>
                  ) : (
                    <div className="divide-y" style={{ divideColor: C.line }}>
                      {filteredItems.map((it, idx) => {
                        const isExpanded = expandedItemId === it.id;
                        const deltaVal = it.value - it.startingValue;
                        const isCrashed = it.trend === TRENDS.CRASHED;
                        const themeColor = isCrashed ? C.red : (deltaVal > 0 ? C.green : deltaVal < 0 ? C.red : C.amber);
                        
                        return (
                          <div 
                            key={it.id} 
                            onClick={() => setExpandedItemId(isExpanded ? null : it.id)}
                            className={`flex flex-col px-4 py-3.5 transition-all duration-150 hover:bg-[#1E2129] cursor-pointer`} 
                            style={{ borderTop: idx === 0 ? "none" : `1px solid ${C.line}` }}
                          >
                            <div className="flex items-center gap-3 w-full">
                              {editingId === it.id ? (
                                <div className="flex items-center gap-2 w-full flex-wrap" onClick={(e) => e.stopPropagation()}>
                                  <input 
                                    value={editDraft.name} 
                                    onChange={(e) => setEditDraft((d) => ({ ...d, name: e.target.value }))}
                                    className="flex-1 min-w-[120px] rounded-lg px-3 py-1.5 text-sm outline-none text-[#EDEEF0]"
                                    style={{ background: C.panel2, color: C.text, border: `1px solid ${C.line}` }} 
                                  />
                                  <input 
                                    value={editDraft.value} 
                                    onChange={(e) => setEditDraft((d) => ({ ...d, value: e.target.value }))} 
                                    inputMode="numeric"
                                    className="w-24 rounded-lg px-3 py-1.5 text-sm outline-none font-mono-custom text-[#EDEEF0]"
                                    style={{ background: C.panel2, color: C.text, border: `1px solid ${C.line}` }}
                                    onKeyDown={(e) => e.key === "Enter" && handleSaveEdit(it.id)} 
                                  />
                                  
                                  {/* Custom Trend Dropdown selector */}
                                  <select
                                    value={editDraft.trend}
                                    onChange={(e) => setEditDraft((d) => ({ ...d, trend: e.target.value }))}
                                    className="rounded-lg px-2 py-1.5 text-xs font-semibold uppercase bg-[#1F232B] text-emerald-400 border border-[#2A2F39] outline-none"
                                  >
                                    <option value={TRENDS.STABLE}>Stable</option>
                                    <option value={TRENDS.RISING}>Rising</option>
                                    <option value={TRENDS.DROPPING}>Dropping</option>
                                    <option value={TRENDS.RISING_SHOULD_DROP}>Rising, Should Drop</option>
                                    <option value={TRENDS.DROPPING_SHOULD_RISE}>Dropping, Should Rise</option>
                                    <option value={TRENDS.CRASHED}>Crashed</option>
                                  </select>

                                  <button 
                                    onClick={() => handleSaveEdit(it.id)} 
                                    className="hover:scale-110 active:scale-90 transition-all p-1.5 text-emerald-400" 
                                    aria-label="Save"
                                  >
                                    <Icon name="Check" size={18} />
                                  </button>
                                  <button 
                                    onClick={() => setEditingId(null)} 
                                    className="hover:scale-110 active:scale-90 transition-all p-1.5" 
                                    style={{ color: C.faint }} 
                                    aria-label="Cancel"
                                  >
                                    <Icon name="X" size={18} />
                                  </button>
                                </div>
                              ) : (
                                <>
                                  <div className="flex-1 min-w-0">
                                    <div className="truncate text-sm font-semibold flex items-center gap-2 flex-wrap" style={{ color: C.text }}>
                                      <span>{it.name}</span>
                                      {renderTrendBadge(it.trend)}
                                    </div>
                                    {it.value !== it.startingValue && (
                                      <div className="text-[10px] mt-0.5 font-mono-custom flex items-center gap-1" style={{ color: C.faint }}>
                                        <span>Started @ {fmt(it.startingValue)}</span>
                                        {isCrashed && (
                                          <span className="text-red-400 font-bold flex items-center gap-0.5">
                                            <Icon name="AlertTriangle" size={10} /> Value Over-Inflated!
                                          </span>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                  <span className="text-sm font-bold font-mono-custom" style={{ color: C.muted }}>
                                    {fmt(it.value)}
                                  </span>
                                  
                                  <div className="flex items-center gap-1.5 ml-2">
                                    <button 
                                      onClick={(e) => startEdit(e, it)} 
                                      className="p-1.5 rounded hover:bg-white/5 active:scale-90 transition-all text-white/40 hover:text-white" 
                                      aria-label="Edit"
                                    >
                                      <Icon name="Pencil" size={14} />
                                    </button>
                                  </div>
                                </>
                              )}
                            </div>

                            {/* Line Graph panel rendered when expanded */}
                            {isExpanded && editingId !== it.id && (
                              <div onClick={(e) => e.stopPropagation()} className="mt-3">
                                <ValuationGraph 
                                  history={getItemValuationHistory(it.id)} 
                                  colorTheme={themeColor}
                                />
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB VIEW 2: PROOFS */}
            {view === "proofs" && (
              <div className="flex flex-col gap-5">
                <div className="rounded-xl p-4 flex flex-col gap-3" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                  <div className="flex gap-2 flex-wrap">
                    <button
                      onClick={handleToggleAuto}
                      className="flex-1 min-w-[140px] rounded-lg px-4 py-2.5 text-xs uppercase font-bold tracking-wider flex items-center justify-center gap-2 transition-all active:scale-95"
                      style={{ background: autoRunning ? C.redDim : C.greenDim, color: autoRunning ? C.red : C.green }}
                    >
                      <Icon name={autoRunning ? "Pause" : "Play"} size={14} />
                      {autoRunning ? "Disable Loop Engine" : "Activate Loop Engine"}
                    </button>
                    <button
                      onClick={generateRandomProof}
                      className="flex-1 min-w-[140px] rounded-lg px-4 py-2.5 text-xs uppercase font-bold tracking-wider flex items-center justify-center gap-2 transition-all hover:bg-[#2A2F39] active:scale-95"
                      style={{ background: C.panel2, color: C.text, border: `1px solid ${C.line}` }}
                    >
                      <Icon name="Shuffle" size={14} /> 
                      Run Evaluation Loop
                    </button>
                  </div>
                  <span className="text-[11px] text-center" style={{ color: C.faint }}>
                    {autoRunning 
                      ? `Simulator generating smart multi-item trend-balanced proofs every ${AUTO_INTERVAL_MS / 1000} seconds.` 
                      : `Simulation systems operational. Activate Loop Engine to automatically build live proof records.`
                    }
                  </span>
                </div>

                <div className="flex flex-col gap-3 animate-fadeIn">
                  <div className="flex justify-between items-center px-1">
                    <span className="text-xs font-bold uppercase tracking-widest text-emerald-400/80">
                      Chronological History (Showing 5 Oldest Proofs)
                    </span>
                    <span className="text-[10px] font-mono-custom text-white/30">
                      Total stored: {proofs.length}
                    </span>
                  </div>
                  
                  {oldestProofsDisplayed.length === 0 && (
                    <div className="rounded-xl p-12 text-center text-sm" style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.faint }}>
                      Waiting for incoming evaluation transactions. Start Auto Proofs or execute manually.
                    </div>
                  )}
                  
                  {oldestProofsDisplayed.map((p) => {
                    const outItems = p.outIds.map((id) => itemsById[id]).filter(Boolean);
                    const inItems = p.inIds.map((id) => itemsById[id]).filter(Boolean);
                    const missing = outItems.length !== p.outIds.length || inItems.length !== p.inIds.length;
                    const outTotal = outItems.reduce((s, i) => s + i.value, 0);
                    const inTotal = inItems.reduce((s, i) => s + i.value, 0);
                    const { verdict, summary } = computeVerdict(outTotal, inTotal);
                    const v = verdictColor(verdict);
                    
                    return (
                      <div key={p.id} className="rounded-xl p-4 flex flex-col gap-3 transition-all duration-150 hover:border-white/10" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold uppercase tracking-widest px-2.5 py-0.5 rounded-full" style={{ color: v.color, background: v.dim }}>
                              {verdict}
                            </span>
                            <span className="flex items-center gap-1 text-[9px] uppercase font-mono-custom tracking-wider text-white/40">
                              <Icon name={p.sourceType === "change" ? "Zap" : "Shuffle"} size={10} />
                              {p.sourceType === "change" ? "Value Action" : "Simulated"}
                            </span>
                          </div>
                          
                          <div className="flex items-center gap-3">
                            <span className="flex items-center gap-1 text-[11px]" style={{ color: C.faint }}>
                              <Icon name="Clock3" size={11} /> 
                              {new Date(p.timestamp).toLocaleTimeString()}
                            </span>
                            <button 
                              onClick={() => handleDeleteProof(p.id)} 
                              className="text-white/30 hover:text-red-400 p-1 transition-colors" 
                              aria-label="Delete proof"
                            >
                              <Icon name="Trash2" size={12} />
                            </button>
                          </div>
                        </div>

                        <p className="text-xs animate-fadeIn" style={{ color: C.muted }}>{summary}</p>
                        
                        {missing && (
                          <p className="text-[10px] italic" style={{ color: C.faint }}>
                            Some items referenced in this proof transaction have since been removed.
                          </p>
                        )}

                        <div className="grid grid-cols-2 gap-4 text-xs pt-1 border-t border-white/5">
                          <div>
                            <div style={{ color: C.faint }} className="mb-1.5 font-mono-custom uppercase tracking-wider text-[10px]">
                              OUTGOING · {fmt(outTotal)}
                            </div>
                            <div className="space-y-1 max-h-[100px] overflow-y-auto">
                              {outItems.map((it) => (
                                <button 
                                  key={it.id} 
                                  onClick={() => handlePetClick(it.name)}
                                  style={{ color: C.muted }} 
                                  className="w-full text-left truncate bg-white/5 px-2 py-1.5 rounded-xl hover:bg-emerald-500/10 hover:text-white flex justify-between items-center transition-all"
                                >
                                  <span className="truncate">{it.name}</span> 
                                  <span className="font-mono-custom text-[10px] text-white/40 ml-1 shrink-0">{fmt(it.value)}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                          <div>
                            <div style={{ color: C.faint }} className="mb-1.5 font-mono-custom uppercase tracking-wider text-[10px]">
                              INCOMING · {fmt(inTotal)}
                            </div>
                            <div className="space-y-1 max-h-[100px] overflow-y-auto">
                              {inItems.map((it) => (
                                <button 
                                  key={it.id} 
                                  onClick={() => handlePetClick(it.name)}
                                  style={{ color: C.muted }} 
                                  className="w-full text-left truncate bg-white/5 px-2 py-1.5 rounded-xl hover:bg-emerald-500/10 hover:text-white flex justify-between items-center transition-all"
                                >
                                  <span className="truncate">{it.name}</span> 
                                  <span className="font-mono-custom text-[10px] text-white/40 ml-1 shrink-0">{fmt(it.value)}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* TAB VIEW 3: VALUE CHANGES */}
            {view === "changes" && (
              <div className="flex flex-col gap-5">
                <div className="flex flex-col gap-2">
                  <span className="text-xs font-bold uppercase tracking-widest px-1 text-emerald-400/80">
                    Inventory Movers
                  </span>
                  
                  <div className="rounded-xl overflow-hidden" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
                    {rankedChanges.map((it, idx) => {
                      const up = it.delta > 0, down = it.delta < 0;
                      const color = up ? C.green : down ? C.red : C.faint;
                      const IconName = up ? "TrendingUp" : down ? "TrendingDown" : "Minus";
                      
                      return (
                        <div 
                          key={it.id} 
                          className="flex items-center gap-3 px-4 py-3" 
                          style={{ borderTop: idx === 0 ? "none" : `1px solid ${C.line}` }}
                        >
                          <div className="flex-1 min-w-0">
                            <div className="truncate text-sm font-medium" style={{ color: C.text }}>
                              {it.name}
                            </div>
                            <div className="text-[10px] font-mono-custom" style={{ color: C.faint }}>
                              Base {fmt(it.startingValue)} → Live {fmt(it.value)}
                            </div>
                          </div>
                          <div className="flex items-center gap-1 text-xs font-bold font-mono-custom" style={{ color }}>
                            <Icon name={IconName} size={14} />
                            {it.pct === 0 ? "0%" : `${it.pct > 0 ? "+" : ""}${it.pct.toFixed(1)}%`}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="flex flex-col gap-2">
                  <span className="text-xs font-bold uppercase tracking-widest px-1 text-emerald-400/80">
                    Live Ledger Change Log
                  </span>
                  
                  {changeLog.length === 0 && (
                    <div className="rounded-xl p-12 text-center text-sm" style={{ background: C.panel, border: `1px solid ${C.line}`, color: C.faint }}>
                      Modifications to item valuations will construct a historical registry here.
                    </div>
                  )}
                  
                  <div className="space-y-2">
                    {changeLog.map((c) => {
                      const up = c.newValue > c.oldValue;
                      return (
                        <div 
                          key={c.id} 
                          className="rounded-xl px-4 py-3 flex items-center justify-between hover:border-white/10 transition-all duration-150" 
                          style={{ background: C.panel, border: `1px solid ${C.line}` }}
                        >
                          <div className="min-w-0">
                            <div className="text-sm font-medium truncate" style={{ color: C.text }}>
                              {c.itemName}
                            </div>
                            <div className="text-[10px]" style={{ color: C.faint }}>
                              {new Date(c.timestamp).toLocaleString()}
                            </div>
                          </div>
                          <div className="flex items-center gap-2 text-xs shrink-0 font-mono-custom">
                            <span style={{ color: C.faint }}>{fmt(c.oldValue)}</span>
                            <span style={{ color: C.faint }}>→</span>
                            <span className="font-bold" style={{ color: up ? C.green : C.red }}>
                              {fmt(c.newValue)}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Mount application
    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<ValueLedger />);
  </script>
</body>
</html>
